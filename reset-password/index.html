<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capishify — Yeni Şifre Belirle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F172A;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #1E293B;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .logo { font-size: 28px; font-weight: 800; color: #38BDF8; margin-bottom: 8px; letter-spacing: -0.5px; }
    .logo-bar { width: 36px; height: 3px; background: #38BDF8; border-radius: 2px; margin: 0 auto 32px; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38BDF8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* States */
    #state-loading, #state-form, #state-success, #state-error { display: none; }

    /* Form */
    .title { font-size: 20px; font-weight: 700; color: #F8FAFC; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #94A3B8; line-height: 1.6; margin-bottom: 32px; }
    .field { position: relative; margin-bottom: 16px; text-align: left; }
    .field label { display: block; font-size: 13px; color: #94A3B8; margin-bottom: 6px; font-weight: 500; }
    .field input {
      width: 100%;
      background: #0F172A;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 13px 44px 13px 16px;
      font-size: 15px;
      color: #F8FAFC;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #38BDF8; }
    .field input.error-input { border-color: #EF4444; }
    .toggle-eye {
      position: absolute;
      right: 14px;
      bottom: 14px;
      cursor: pointer;
      color: #64748B;
      font-size: 18px;
      user-select: none;
      line-height: 1;
    }
    .toggle-eye:hover { color: #94A3B8; }
    .field-error { font-size: 12px; color: #EF4444; margin-top: 5px; display: none; }

    /* Password strength */
    .strength-bar { display: flex; gap: 4px; margin-top: 8px; }
    .strength-seg {
      flex: 1; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.08);
      transition: background 0.3s;
    }
    .strength-label { font-size: 11px; color: #64748B; margin-top: 4px; text-align: right; }

    /* Submit button */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #38BDF8 0%, #0EA5E9 100%);
      color: #0F172A;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-loading { display: inline-flex; align-items: center; gap: 8px; }

    /* Success */
    .success-icon { font-size: 52px; margin-bottom: 16px; }
    .open-app-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 13px 32px;
      background: linear-gradient(135deg, #38BDF8, #0EA5E9);
      color: #0F172A;
      font-weight: 700;
      font-size: 15px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .open-app-btn:hover { opacity: 0.9; }

    /* Error */
    .error-icon { font-size: 52px; margin-bottom: 16px; }
    .error-text { font-size: 14px; color: #EF4444; margin-top: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Capishify</div>
    <div class="logo-bar"></div>

    <!-- Loading -->
    <div id="state-loading">
      <div class="spinner"></div>
      <div class="title">Doğrulanıyor...</div>
      <p class="subtitle">Bağlantın kontrol ediliyor.</p>
    </div>

    <!-- Form -->
    <div id="state-form">
      <div class="title">Yeni Şifre Belirle</div>
      <p class="subtitle">En az 8 karakter kullan.</p>

      <div class="field">
        <label for="password">Yeni Şifre</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
        <span class="toggle-eye" onclick="toggleEye('password', 'eye1')" id="eye1">👁</span>
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
        <div class="field-error" id="err-password"></div>
      </div>

      <div class="field">
        <label for="password2">Şifreyi Onayla</label>
        <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password" />
        <span class="toggle-eye" onclick="toggleEye('password2', 'eye2')" id="eye2">👁</span>
        <div class="field-error" id="err-password2"></div>
      </div>

      <button class="btn" id="submitBtn" onclick="handleSubmit()" disabled>Şifremi Güncelle</button>
      <div class="error-text" id="submitError" style="display:none;"></div>
    </div>

    <!-- Success -->
    <div id="state-success">
      <div class="success-icon">✅</div>
      <div class="title">Şifren Güncellendi!</div>
      <p class="subtitle">Artık yeni şifrenle giriş yapabilirsin.</p>
      <a class="open-app-btn" id="openAppBtn" href="capishify://auth-callback">Uygulamayı Aç</a>
    </div>

    <!-- Error -->
    <div id="state-error">
      <div class="error-icon">⚠️</div>
      <div class="title">Geçersiz Bağlantı</div>
      <p class="subtitle">Bu link geçersiz veya süresi dolmuş.<br/>Şifre sıfırlama isteğini tekrar gönder.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    var SUPABASE_URL = 'https://xjxilfgtyliohrkekryp.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqeGlsZmd0eWxpb2hya2VrcnlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5Nzg2OTMsImV4cCI6MjA5MzU1NDY5M30.a1xbEA0saQUwi-JfyqoN2gN8Ml78eyMIlIP1wViGaf4';
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function show(id) {
      ['state-loading','state-form','state-success','state-error'].forEach(function(s) {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function toggleEye(inputId, eyeId) {
      var inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      document.getElementById(eyeId).textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    // Şifre gücü
    var colors = ['#EF4444','#F97316','#EAB308','#22C55E'];
    var labels = ['Çok zayıf','Zayıf','Orta','Güçlü'];
    function calcStrength(pw) {
      var score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }
    function updateStrength(pw) {
      var score = pw.length === 0 ? 0 : calcStrength(pw);
      for (var i = 1; i <= 4; i++) {
        document.getElementById('s' + i).style.background =
          i <= score ? colors[score - 1] : 'rgba(255,255,255,0.08)';
      }
      document.getElementById('strengthLabel').textContent =
        pw.length === 0 ? '' : labels[score - 1] || '';
    }

    function validate() {
      var pw = document.getElementById('password').value;
      var pw2 = document.getElementById('password2').value;
      var ok = pw.length >= 8 && pw === pw2;
      document.getElementById('submitBtn').disabled = !ok;
    }

    document.getElementById('password').addEventListener('input', function() {
      updateStrength(this.value);
      clearError('password');
      validate();
    });
    document.getElementById('password2').addEventListener('input', function() {
      clearError('password2');
      validate();
    });

    function showError(field, msg) {
      var el = document.getElementById('err-' + field);
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById(field).classList.add('error-input');
    }
    function clearError(field) {
      document.getElementById('err-' + field).style.display = 'none';
      document.getElementById(field).classList.remove('error-input');
    }

    async function handleSubmit() {
      var pw = document.getElementById('password').value;
      var pw2 = document.getElementById('password2').value;
      var valid = true;

      if (pw.length < 8) {
        showError('password', 'Şifre en az 8 karakter olmalı.');
        valid = false;
      }
      if (pw !== pw2) {
        showError('password2', 'Şifreler eşleşmiyor.');
        valid = false;
      }
      if (!valid) return;

      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Güncelleniyor...';

      var errEl = document.getElementById('submitError');
      errEl.style.display = 'none';

      var result = await sb.auth.updateUser({ password: pw });
      if (result.error) {
        errEl.textContent = 'Bir hata oluştu: ' + result.error.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Şifremi Güncelle';
      } else {
        show('state-success');
      }
    }

    // Başlatma: hash'ten token oku, session kur
    (async function init() {
      show('state-loading');
      var hash = window.location.hash;
      var params = new URLSearchParams(hash.slice(1));
      var access_token = params.get('access_token');
      var refresh_token = params.get('refresh_token');

      if (!access_token || !refresh_token) {
        show('state-error');
        return;
      }

      var result = await sb.auth.setSession({ access_token: access_token, refresh_token: refresh_token });
      if (result.error || !result.data.session) {
        show('state-error');
        return;
      }

      show('state-form');
    })();
  </script>
</body>
</html>
