<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capishify — Yönlendiriliyor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F172A;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1E293B;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .logo { font-size: 28px; font-weight: 800; color: #38BDF8; margin-bottom: 32px; letter-spacing: -0.5px; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38BDF8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 18px; font-weight: 700; color: #F8FAFC; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #94A3B8; line-height: 1.6; }
    .success-icon { font-size: 48px; margin-bottom: 16px; display: none; }
    .error-msg { color: #EF4444; font-size: 14px; margin-top: 16px; display: none; }
    .store-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: linear-gradient(135deg,#38BDF8,#0EA5E9);
      color: #0F172A;
      font-weight: 700;
      font-size: 15px;
      border-radius: 12px;
      text-decoration: none;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Capishify</div>
    <div class="success-icon" id="successIcon">✅</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="statusText">Doğrulanıyor...</div>
    <div class="sub" id="subText">Hesabın doğrulanıyor, bir saniye bekle.</div>
    <div class="error-msg" id="errorMsg"></div>
    <a class="store-btn" id="storeBtn" href="https://play.google.com/store/apps/details?id=com.capishify">Google Play'den İndir</a>
  </div>

  <script>
    (function () {
      var hash = window.location.hash;
      var params = new URLSearchParams(hash.slice(1));
      var errorCode = params.get('error_code') || params.get('error');
      var errorDesc = params.get('error_description');
      var type = params.get('type');

      if (errorCode) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('statusText').textContent = 'Bir sorun oluştu';
        document.getElementById('subText').textContent = 'Bu bağlantı geçersiz veya süresi dolmuş olabilir.';
        var errEl = document.getElementById('errorMsg');
        errEl.textContent = decodeURIComponent((errorDesc || errorCode).replace(/\+/g, ' '));
        errEl.style.display = 'block';
        return;
      }

      if (hash && (params.get('access_token') || params.get('token_hash'))) {
        if (type === 'recovery') {
          var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
          if (!isMobile) {
            // Masaüstü → direkt web şifre sıfırlama sayfasına yönlendir
            window.location.href = '/reset-password' + hash;
          } else {
            // Mobil: önce uygulamayı aç
            window.location.href = 'capishify://auth-callback' + hash;
            setTimeout(function () {
              // Hâlâ buradaysak uygulama yüklü değil → mağazaya yönlendir
              document.getElementById('spinner').style.display = 'none';
              document.getElementById('successIcon').style.display = 'block';
              document.getElementById('statusText').textContent = 'Uygulamayı İndir';
              document.getElementById('subText').textContent =
                'Şifreni sıfırlamak için önce Capishify uygulamasını indir.';
              document.getElementById('storeBtn').style.display = 'inline-block';
            }, 2000);
          }
        } else {
          // Diğer tipler (signup, magiclink, email_change, invite) → uygulamaya aç
          window.location.href = 'capishify://auth-callback' + hash;

          setTimeout(function () {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('successIcon').style.display = 'block';
            document.getElementById('statusText').textContent = 'Uygulama açılıyor!';
            document.getElementById('subText').textContent =
              'Capishify uygulaması açılmadıysa aşağıdan indirebilirsin.';
            document.getElementById('storeBtn').style.display = 'inline-block';
          }, 2000);
        }
      } else {
        // Token yok — direkt ziyaret
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('statusText').textContent = 'Geçersiz Bağlantı';
        document.getElementById('subText').textContent =
          'Bu sayfa yalnızca doğrulama e-postasındaki butonla çalışır.';
      }
    })();
  </script>
</body>
</html>
